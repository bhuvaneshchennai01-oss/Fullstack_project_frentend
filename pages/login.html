<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – FinSmart</title>
    <meta name="description" content="Log in to your FinSmart dashboard to manage loans and borrowers.">
    <link rel="stylesheet" href="../style/variables.css">
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/layout.css">
    <link rel="stylesheet" href="../style/pages.css">
    <link rel="stylesheet" href="../style/animations.css">
    <link rel="stylesheet" href="../style/responsive.css">
</head>

<body>
    <div class="auth-layout">
        <div class="auth-card">
            <a href="../index.html" class="auth-logo">
                <div class="sidebar-logo-icon">F</div>
                <span class="sidebar-logo-text">FinSmart</span>
            </a>

            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Enter your credentials to access your dashboard</p>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email Address</label>
                    <div class="input-group">
                        <span class="input-icon" data-icon="email"></span>
                        <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required
                            autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <div class="input-group password-group">
                        <span class="input-icon" data-icon="lock"></span>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required
                            minlength="6" autocomplete="off">
                        <button type="button" class="password-toggle" data-icon="eye"
                            aria-label="Toggle password visibility"></button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkbox-checkmark"></span>
                        <span class="checkbox-label">Keep me signed in</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg ripple" style="width:100%;">
                    Sign In
                </button>

                <div class="auth-divider">or</div>


            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Create one free</a>
            </div>
        </div>
    </div>

    <script src="../script/app.js"></script>
    <script src="../script/api.js"></script>
    <script src="../script/auth.js"></script>
</body>

</html>
